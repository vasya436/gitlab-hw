resource "yandex_lb_target_group" "target-group" {
  name = "target-group"

  target {
    address   = yandex_compute_instance.web_server[0].network_interface.0.ip_ad>
    subnet_id = yandex_vpc_subnet.subnet-1.id
  }

  target {
    address   = yandex_compute_instance.web_server[1].network_interface.0.ip_ad>
    subnet_id = yandex_vpc_subnet.subnet-1.id
  }
}

resource "yandex_lb_network_load_balancer" "nlb" {
  name = "nlb"

  listener {
    name        = "listener"
    port        = 80
target_port = 80

    external_address_spec {
      ip_version = "ipv4"
    }
  }

  attached_target_group {
    target_group_id = yandex_lb_target_group.target-group.id

    healthcheck {
      name = "http-health-check"
      http_options {
        port = 80
        path = "/"
      }
    }
  }
}
